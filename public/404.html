<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BetterNews</title>
    <script>
      // GitHub Pages SPA redirect:
      // Save the full path in sessionStorage and redirect to the root.
      // The root page will read it back and restore the URL via history.replaceState.
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('gh-pages-redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
